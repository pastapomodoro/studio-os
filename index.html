  const[colW,setColW]=useState(38);
  const ganttRef=useRef(null);
  const barRefs=useRef({});
  const assignments=p.assignments||[];
  const lavorazioni=p.lavorazioni||[];
  const personIds=[...new Set(assignments.map(a=>a.userId))];

  const LABEL_W=260;
  const ROW_H=92;
  const BAR_TOP=22;
  const BAR_H=48;
  const today=new Date();today.setHours(0,0,0,0);

  const pStart=new Date(p.startDate||Date.now());pStart.setHours(0,0,0,0);
  const pEnd=new Date(p.endDate||(Date.now()+90*86400000));pEnd.setHours(0,0,0,0);

  const maxTaskEnd=lavorazioni.reduce((mx,lv)=>{
    if(!lv.endDate)return mx;const d=new Date(lv.endDate);return d>mx?d:mx;
  },pEnd);
  const cropDays=Math.max(7,Math.ceil((pEnd-pStart)/86400000))+7;
  const fullDays=Math.max(cropDays,Math.ceil((maxTaskEnd-pStart)/86400000)+7);
  const TOTAL_DAYS=fitDeadline?cropDays:fullDays;

  /* measure container → auto-fit COL_W */
  useEffect(()=>{
    if(!ganttRef.current)return;
    const measure=()=>{
      const avail=ganttRef.current.offsetWidth||800;
      const computed=Math.max(28,Math.floor((avail-LABEL_W)/TOTAL_DAYS));
      setColW(Math.min(computed,64));
    };
    measure();
    window.addEventListener('resize',measure);
    return()=>window.removeEventListener('resize',measure);
  },[TOTAL_DAYS]);

  /* build day array */
  const days=[];
  for(let i=0;i<TOTAL_DAYS;i++)days.push(new Date(pStart.getTime()+i*86400000));

  /* month bands for header (with alternating index) */
  const bands=[];
  const dayBandIdx=[];
  days.forEach((d,i)=>{
    const mk=d.getFullYear()+'-'+d.getMonth();
    if(!bands.length||bands[bands.length-1].key!==mk)
      bands.push({key:mk,label:d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}),start:i,count:0});
    bands[bands.length-1].count++;
    dayBandIdx[i]=bands.length-1;
  });
  const MONTH_TINT='rgba(0,102,238,.04)';

  const dateToCol=d=>Math.round((new Date(d)-pStart)/86400000);
  const isWE=d=>{const w=d.getDay();return w===0||w===6;};
  const todayCol=dateToCol(today);
  const deadlineCol=p.endDate?dateToCol(new Date(p.endDate)):null;
  const wdBetween=(s,e)=>{let d=new Date(s),n=0;while(d<new Date(e)){d=new Date(d.getTime()+86400000);if(d.getDay()&&d.getDay()<6)n++;}return n;};

  /* legacy vars still used by PhasesView */
  const totalMs=pEnd-pStart||1;
  const posOf=d=>d?Math.max(0,Math.min(100,((new Date(d)-pStart)/totalMs)*100)):0;
  const widthOf=(s,e)=>s&&e?Math.max(.5,posOf(e)-posOf(s)):.5;
  const nowPos=posOf(new Date());
  const deadlinePos=p.endDate?posOf(new Date(p.endDate)):null;
  const months=[];let mc=new Date(pStart);mc.setDate(1);
  while(mc<=pEnd){months.push(new Date(mc));mc.setMonth(mc.getMonth()+1);}

  /* ── DRAG & RESIZE: direct DOM manipulation (no React re-render during drag) ── */
  const startDrag=(e,type,lv,pxPerDay)=>{
    if(!isAdmin||!lv.startDate||!lv.endDate)return;
    e.stopPropagation();e.preventDefault();
    const bar=barRefs.current[lv.id];if(!bar)return;
    const origLeft=parseFloat(bar.style.left)||0;
    const origWidth=parseFloat(bar.style.width)||pxPerDay;
    const startX=e.clientX;
    let dDays=0;
    setDragging({lavId:lv.id,type});
    bar.style.transition='none';bar.style.zIndex='30';bar.style.opacity='.92';
    const onMove=ev=>{
      const dx=ev.clientX-startX;
      dDays=Math.round(dx/pxPerDay);
      const dPx=dDays*pxPerDay;
      if(type==='move'){bar.style.left=(origLeft+dPx)+'px';}
      else{bar.style.width=Math.max(pxPerDay,origWidth+dPx)+'px';}
    };
    const onUp=()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      setDragging(null);
      if(dDays===0){
        // no movement → treat as click: restore style and open editor
        bar.style.left=origLeft+'px';bar.style.width=origWidth+'px';
        bar.style.zIndex='';bar.style.opacity='';bar.style.transition='';
        if(type==='move')setEditLav({...lv});
        return;
      }
      const cur=lavorazioni.find(x=>x.id===lv.id);if(!cur){return;}
      const fmt=d=>d.toISOString().split('T')[0];
      let ns=cur.startDate,ne=cur.endDate;
      if(type==='move'){
        const s=new Date(cur.startDate);s.setDate(s.getDate()+dDays);
        const e2=new Date(cur.endDate);e2.setDate(e2.getDate()+dDays);
        ns=fmt(s);ne=fmt(e2);
      }else{
        const e2=new Date(cur.endDate);e2.setDate(e2.getDate()+dDays);
        const minE=new Date(cur.startDate);minE.setDate(minE.getDate()+1);
        ne=fmt(e2<minE?minE:e2);
      }
      up({lavorazioni:lavorazioni.map(x=>x.id===lv.id?{...x,startDate:ns,endDate:ne}:x)});
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const saveDates=()=>{up({startDate:draftStart,endDate:draftEnd});setEditDates(false);};
  const emptyBlock=()=>({id:uid(),userId:users[0]?.id||'',dutyId:duties[0]?.id||'',startDate:p.startDate||'',endDate:p.endDate||'',allocationPct:100});
  const saveBlock=b=>{const ex=assignments.find(a=>a.id===b.id);up({assignments:ex?assignments.map(a=>a.id===b.id?b:a):[...assignments,b]});setEditBlock(null);setAddingBlock(false);};
  const deleteBlock=id=>up({assignments:assignments.filter(a=>a.id!==id)});
  const saveLav=l=>{up({lavorazioni:lavorazioni.map(x=>x.id===l.id?l:x)});setEditLav(null);};
  const doAutoSchedule=()=>{
    if(!p.startDate)return alert('Set a project start date first');
    up({lavorazioni:autoSchedule(lavorazioni,p.startDate)});
  };

  /* ─ date header ─ */
  const DateHeader=()=><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'11px 14px',background:'var(--surface-2)',border:'1px solid var(--rule)',borderRadius:'var(--r-md)'}}>
    <i className="ti ti-calendar-event"style={{fontSize:16,color:'var(--gold)',flexShrink:0}}/>
    {editDates?(
      <>
        <div style={{display:'flex',alignItems:'center',gap:6,flex:1,flexWrap:'wrap'}}>
          <input type="date"value={draftStart}onChange={e=>setDraftStart(e.target.value)}style={{width:150}}/>
          <span style={{color:'var(--ink-4)',fontSize:13}}>→</span>
          <input type="date"value={draftEnd}onChange={e=>setDraftEnd(e.target.value)}style={{width:150}}/>
        </div>
        <button className="btn btn-primary btn-sm"onClick={saveDates}>Save</button>
        <button className="btn btn-sm"onClick={()=>setEditDates(false)}>Cancel</button>
      </>
    ):(
      <>
        <div style={{flex:1}}>
          {p.startDate&&p.endDate?(
            <span style={{fontSize:13,fontWeight:600,color:'var(--ink-2)'}}>
              {fmt.date(p.startDate)}
              <span style={{color:'var(--ink-4)',margin:'0 6px'}}>→</span>
              {fmt.date(p.endDate)}
              <span style={{marginLeft:10,fontSize:11,color:'var(--ink-4)',fontWeight:400}}>
                {workDaysBetween(p.startDate,p.endDate)} working days
              </span>
            </span>
          ):(
            <span style={{fontSize:13,color:'var(--ink-4)',fontStyle:'italic'}}>No start/deadline set</span>
          )}
        </div>
        {isAdmin&&<button className="btn btn-ghost btn-sm"onClick={()=>{setDraftStart(p.startDate||'');setDraftEnd(p.endDate||'');setEditDates(true);}}>
          <i className="ti ti-edit"/>Edit dates
        </button>}
      </>
    )}
  </div>;

  /* ─ tasks gantt — CSS Grid, time_manager style ─ */
  const TasksView=()=>{
    const totalH=lavorazioni.reduce((s,l)=>s+(+l.hoursTotal||0),0);
    const gridCols=`${LABEL_W}px repeat(${TOTAL_DAYS},${colW}px)`;
    const canvasW=LABEL_W+TOTAL_DAYS*colW;
    const AV_PAL=[['#DBEAFE','#1D4ED8'],['#FCE7F3','#BE185D'],['#D1FAE5','#065F46'],['#FEF3C7','#92400E'],['#FEE2E2','#991B1B'],['#E0F2FE','#0369A1']];

    return<div>
      <DateHeader/>
      {/* toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:'var(--ink-3)'}}><b style={{color:'var(--ink)',fontWeight:700}}>{lavorazioni.length}</b> tasks · <b style={{color:'var(--ink)',fontWeight:700}}>{totalH.toFixed(0)}h</b></span>
        {p.endDate&&<label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,fontWeight:600,color:fitDeadline?'var(--gold)':'var(--ink-3)',cursor:'pointer',padding:'4px 10px',borderRadius:6,border:`1.5px solid ${fitDeadline?'var(--gold)':'var(--parchment-2)'}`,background:'var(--white)',transition:'all .15s',userSelect:'none'}}>
          <input type="checkbox" checked={fitDeadline} onChange={e=>setFitDeadline(e.target.checked)} style={{accentColor:'var(--gold)',width:13,height:13}}/>
          Fit to deadline
        </label>}
        <span className="spacer"/>
        {isAdmin&&p.startDate&&lavorazioni.length>0&&<button className="btn btn-sm"onClick={doAutoSchedule}><i className="ti ti-wand"/>Auto-schedule</button>}
        {isAdmin&&<button className="btn btn-sm"onClick={()=>up({lavorazioni:[...lavorazioni,{id:uid(),name:'New task',category:'Altro',quantity:1,hoursTotal:8,costPerUnit:0,assignedUserIds:[],startDate:p.startDate||'',endDate:'',notes:''}]})}><i className="ti ti-plus"/>Add task</button>}
      </div>

      {lavorazioni.length===0&&<div className="empty-state"><i className="ti ti-list-check"/><p>No tasks defined</p><small>Convert an estimation to populate tasks, or add one manually</small></div>}

      {lavorazioni.length>0&&<div ref={ganttRef} style={{border:'1px solid var(--rule)',borderRadius:'var(--r-lg)',overflow:'hidden',background:'var(--white)',cursor:dragging?dragging.type==='resize'?'ew-resize':'grabbing':'auto',userSelect:dragging?'none':'auto'}}>
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <div style={{display:'grid',gridTemplateColumns:gridCols,width:canvasW,position:'relative'}}>

            {/* ── CORNER ── */}
            <div style={{gridColumn:1,gridRow:'1/3',background:'var(--paper)',borderRight:'2px solid var(--parchment-2)',borderBottom:'2px solid var(--parchment-2)',display:'flex',alignItems:'flex-end',padding:'8px 14px',fontSize:10,fontWeight:700,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'.06em'}}>Task</div>

            {/* ── MONTH BANDS (alternating tint) ── */}
            {bands.map((b,i)=>{
              const alt=i%2===1;
              return<div key={i} style={{gridColumn:`${b.start+2}/${b.start+b.count+2}`,gridRow:1,background:alt?MONTH_TINT:'var(--paper)',borderRight:'1px solid var(--parchment-2)',borderBottom:'1px solid var(--parchment-2)',padding:'10px 14px',fontSize:13,fontWeight:700,color:alt?'var(--gold-text)':'var(--ink-2)',whiteSpace:'nowrap',overflow:'hidden',letterSpacing:'-.01em'}}>{b.label}</div>;
            })}

            {/* ── DAY HEADERS ── */}
            {days.map((d,i)=>{
              const isT=d.getTime()===today.getTime();
              const we=isWE(d);
              const alt=dayBandIdx[i]%2===1;
              const bg=isT?'rgba(0,102,238,.1)':we?(alt?'rgba(0,102,238,.06)':'rgba(0,0,0,.03)'):alt?MONTH_TINT:'var(--paper)';
              return<div key={i} style={{gridColumn:i+2,gridRow:2,background:bg,borderRight:'1px solid rgba(0,0,0,.04)',borderBottom:'2px solid var(--parchment-2)',padding:'6px 0',fontSize:12,fontWeight:isT?800:600,color:isT?'var(--gold)':we?'var(--ink-5)':'var(--ink-4)',textAlign:'center',fontFamily:'var(--mono)',position:'relative'}}>
                {d.getDate()}
                {isT&&<div style={{position:'absolute',bottom:-2,left:'50%',transform:'translateX(-50%)',width:5,height:5,borderRadius:'50%',background:'var(--gold)'}}/>}
              </div>;
            })}

            {/* ── TASK ROWS ── */}
            {lavorazioni.map((lv,idx)=>{
              const lvD=lv;
              const color=CATEGORY_COLORS[lv.category]||'#6B7280';
              const assigned=(lv.assignedUserIds||[]).map(uid2=>users.find(u=>u.id===uid2)).filter(Boolean);
              const numA=Math.max(assigned.length,1);
              const realH=(+lv.hoursTotal||0)/numA;
              const wDays=Math.max(Math.ceil(realH/HOURS_PER_DAY),1);
              const hasDate=lvD.startDate&&lvD.endDate;
              const barCol=hasDate?Math.max(0,dateToCol(lvD.startDate)):0;
              const barDur=hasDate?Math.max(1,Math.round((new Date(lvD.endDate)-new Date(lvD.startDate))/86400000)):1;
              const barLeft=barCol*colW;
              const barWpx=Math.max(barDur*colW,colW*0.8);
              const isDrag=dragging&&dragging.lavId===lv.id;
              const gridRow=3+idx;

              return[
                /* Label cell */
                <div key={`lc${lv.id}`} style={{gridColumn:1,gridRow,display:'flex',alignItems:'center',gap:8,padding:'0 10px 0 14px',borderRight:'2px solid var(--parchment-2)',borderBottom:'1px solid var(--rule)',background:'var(--white)',minHeight:ROW_H,cursor:isAdmin?'pointer':'default',transition:'background .1s'}}
                  onClick={()=>!dragging&&isAdmin&&setEditLav({...lv})}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--surface-2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                  <div style={{width:4,height:48,borderRadius:2,background:color,flexShrink:0}}/>
                  <div style={{overflow:'hidden',flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.01em'}}>{lv.name}</div>
                    <div style={{fontSize:11,color:'var(--ink-4)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{assigned.length?assigned.map(u=>u.name).join(', '):'Unassigned'}</div>
                    {lv.notes&&<div style={{fontSize:10.5,color:'var(--ink-3)',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}} title={lv.notes}><i className="ti ti-note"style={{fontSize:11,color:color,flexShrink:0}}/>{lv.notes}</div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',flexShrink:0,marginLeft:'auto'}}>
                    {assigned.slice(0,3).map((u,ai)=>{
                      const[bg]=AV_PAL[ai%AV_PAL.length];
                      return<div key={u.id} style={{width:24,height:24,borderRadius:'50%',background:u.color||bg,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,border:'2px solid var(--white)',marginLeft:ai?-6:0,flexShrink:0}}>{u.avatar}</div>;
                    })}
                    {assigned.length>3&&<div style={{width:24,height:24,borderRadius:'50%',background:'var(--surface-3)',color:'var(--ink-3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,border:'2px solid var(--white)',marginLeft:-6}}>+{assigned.length-3}</div>}
                  </div>
                </div>,

                /* Track cells (one per day) */
                ...days.map((d,i)=>{
                  const we=isWE(d);const isT=d.getTime()===today.getTime();
                  const alt=dayBandIdx[i]%2===1;
                  const bg=isT?'rgba(0,102,238,.04)':we?(alt?'rgba(0,102,238,.035)':'rgba(0,0,0,.02)'):alt?'rgba(0,102,238,.022)':'var(--white)';
                  return<div key={`tc${lv.id}-${i}`} style={{gridColumn:i+2,gridRow,borderRight:'1px solid rgba(0,0,0,.04)',borderBottom:'1px solid var(--rule)',background:bg,minHeight:ROW_H,position:'relative'}}/>;
                }),

                /* Bar overlay — spans all day columns in this row */
                <div key={`bo${lv.id}`} style={{gridColumn:`2/${TOTAL_DAYS+2}`,gridRow,position:'relative',pointerEvents:'none',zIndex:5}}>
                  {/* deadline slice */}
                  {deadlineCol!==null&&deadlineCol>=0&&deadlineCol<=TOTAL_DAYS&&<div style={{position:'absolute',left:deadlineCol*colW,top:0,bottom:0,width:2,background:'repeating-linear-gradient(to bottom,var(--danger) 0,var(--danger) 6px,transparent 6px,transparent 10px)',zIndex:6,pointerEvents:'none'}}/>}
                  {/* today line slice */}
                  {todayCol>=0&&todayCol<TOTAL_DAYS&&<div style={{position:'absolute',left:todayCol*colW+colW/2,top:0,bottom:0,width:1.5,background:'var(--gold)',opacity:.6,zIndex:6,pointerEvents:'none'}}/>}
                  {/* bar */}
                  {hasDate?<div ref={el=>{if(el)barRefs.current[lv.id]=el;}} style={{position:'absolute',left:barLeft+'px',top:BAR_TOP,width:barWpx+'px',height:BAR_H,borderRadius:8,background:color,display:'flex',alignItems:'center',paddingLeft:12,paddingRight:10,cursor:isAdmin?'grab':'default',boxShadow:`0 2px 6px ${color}30,0 1px 2px rgba(0,0,0,.1)`,transition:'box-shadow .12s',zIndex:5,overflow:'hidden',whiteSpace:'nowrap',pointerEvents:'auto'}}
                    onMouseDown={e=>startDrag(e,'move',lv,colW)}
                    onClick={e=>{if(!dragging)e.stopPropagation();}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,overflow:'hidden',flex:1,pointerEvents:'none',minWidth:0}}>
                      {barWpx>50&&<span style={{fontSize:13,fontWeight:700,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',flex:1,letterSpacing:'-.01em'}}>{lv.name}</span>}
                      {lv.notes&&barWpx>60&&<i className="ti ti-note"style={{fontSize:14,color:'rgba(255,255,255,.85)',flexShrink:0}}title={lv.notes}/>}
                      {barWpx>110&&<span style={{fontSize:11,fontWeight:700,background:'rgba(255,255,255,.22)',padding:'2px 7px',borderRadius:10,color:'#fff',flexShrink:0,whiteSpace:'nowrap'}}>{wdBetween(lv.startDate,lv.endDate)}d</span>}
                    </div>
                    {isAdmin&&<div style={{position:'absolute',right:0,top:0,width:10,height:'100%',cursor:'ew-resize',borderRadius:'0 8px 8px 0',display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(255,255,255,.15)',pointerEvents:'auto'}}
                      onMouseDown={e=>startDrag(e,'resize',lv,colW)}>
                      <div style={{width:2,height:14,background:'rgba(255,255,255,.75)',borderRadius:1}}/>
                    </div>}
                  </div>
                  :<div style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:11,color:'var(--ink-5)',fontStyle:'italic',pointerEvents:'auto',zIndex:5}}>
                    No dates{isAdmin&&<span style={{cursor:'pointer',color:'var(--gold)',marginLeft:4,textDecoration:'underline'}}onClick={()=>setEditLav({...lv})}>set dates</span>}
                  </div>}
                </div>
              ];
            })}
          </div>
        </div>

        {/* Legend */}
        <div style={{borderTop:'1px solid var(--rule)',background:'var(--paper)',padding:'8px 14px',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--ink-4)'}}><div style={{width:12,height:2,background:'var(--gold)',borderRadius:1}}/>Today</div>
          {p.endDate&&<div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--ink-4)'}}><div style={{width:12,height:2,backgroundImage:'repeating-linear-gradient(to right,var(--danger) 0,var(--danger) 4px,transparent 4px,transparent 7px)'}}/>Deadline</div>}
          {[...new Set(lavorazioni.map(l=>l.category))].map(cat=>{
            const c=CATEGORY_COLORS[cat]||'#6B7280';
            return<div key={cat}style={{display:'flex',alignItems:'center',gap:5,background:c+'14',border:`1px solid ${c}28`,borderRadius:'var(--r-xs)',padding:'2px 7px'}}>
              <div style={{width:7,height:7,borderRadius:2,background:c}}/><span style={{fontSize:10,color:c,fontWeight:600}}>{cat}</span>
            </div>;
          })}
        </div>
      </div>}
      {editLav&&<LavModal lav={editLav}users={users}onSave={saveLav}onDelete={()=>{up({lavorazioni:lavorazioni.filter(x=>x.id!==editLav.id)});setEditLav(null);}}onClose={()=>setEditLav(null)}/>}
    </div>;
  };

  /* ─ phase drag (same DOM-direct technique) ─ */
  const startDragPhase=(e,type,b,pxPerDay)=>{
    if(!isAdmin||!b.startDate||!b.endDate)return;
    e.stopPropagation();e.preventDefault();
    const bar=barRefs.current['ph_'+b.id];if(!bar)return;
    const origLeft=parseFloat(bar.style.left)||0;
    const origWidth=parseFloat(bar.style.width)||pxPerDay;
    const startX=e.clientX;
    let dDays=0;
    setDragging({lavId:'ph_'+b.id,type});
    bar.style.transition='none';bar.style.zIndex='30';bar.style.opacity='.92';
    const onMove=ev=>{
      const dx=ev.clientX-startX;
      dDays=Math.round(dx/pxPerDay);
      const dPx=dDays*pxPerDay;
      if(type==='move')bar.style.left=(origLeft+dPx)+'px';
      else bar.style.width=Math.max(pxPerDay,origWidth+dPx)+'px';
    };
    const onUp=()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      setDragging(null);
      if(dDays===0){
        bar.style.left=origLeft+'px';bar.style.width=origWidth+'px';
        bar.style.zIndex='';bar.style.opacity='';bar.style.transition='';
        if(type==='move')setEditBlock({...b});
        return;
      }
      const fmt=d=>d.toISOString().split('T')[0];
      let ns=b.startDate,ne=b.endDate;
      if(type==='move'){
        const s=new Date(b.startDate);s.setDate(s.getDate()+dDays);
        const e2=new Date(b.endDate);e2.setDate(e2.getDate()+dDays);
        ns=fmt(s);ne=fmt(e2);
      }else{
        const e2=new Date(b.endDate);e2.setDate(e2.getDate()+dDays);
        const minE=new Date(b.startDate);minE.setDate(minE.getDate()+1);
        ne=fmt(e2<minE?minE:e2);
      }
      up({assignments:assignments.map(a=>a.id===b.id?{...a,startDate:ns,endDate:ne}:a)});
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  /* ─ phases gantt — CSS Grid, same time_manager style ─ */
  const PhasesView=()=>{
    const gridCols=`${LABEL_W}px repeat(${TOTAL_DAYS},${colW}px)`;

function ProjLogTab({p,store,me,up}){
  const{users}=store;
  const[text,setText]=useState('');
  const inputRef=useRef();
  const log=[...(p.log||[])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const addEntry=()=>{
    if(!text.trim())return;
    const entry={id:uid(),userId:me.id,text:text.trim(),createdAt:new Date().toISOString()};
    up({log:[...(p.log||[]),entry]});
    setText('');
  };

  return<div style={{maxWidth:660}}>
    <div style={{marginBottom:28}}>
      <div style={{background:'var(--white)',border:'1.5px solid var(--rule-2)',borderRadius:'var(--r-md)',overflow:'hidden',boxShadow:'var(--shadow-xs)'}}>

          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addEntry();}}}
          placeholder="Write a log entry… press Enter to post."
          style={{width:'100%',border:'none',padding:'13px 14px',fontSize:13,lineHeight:1.6,
            resize:'none',minHeight:80,background:'transparent',outline:'none',
            fontFamily:'var(--sans)',color:'var(--ink)'}}

          padding:'8px 12px',borderTop:'1px solid var(--rule)',background:'var(--paper)'}}>
          <span style={{fontSize:11,color:'var(--ink-5)'}}>Enter to post · Shift+Enter for new line</span>
          <button className="btn btn-primary btn-sm"onClick={addEntry}>
            <i className="ti ti-send"style={{fontSize:12}}/>Post
          </button>
        </div>
      </div>
    </div>

    {!log.length&&(
      <div className="empty-state"style={{padding:'32px 0'}}>
        <i className="ti ti-notes"/>
        <p>No entries yet</p>
        <small>Log decisions, updates, anything worth remembering</small>
      </div>
    )}

    <div>{log.map((entry,i)=>{
      const author=users.find(u=>u.id===entry.userId);
      return(
        <div key={entry.id}className="log-item">
          <div className="log-spine">
            <div className="log-dot"style={{background:author?.color||'var(--ink-4)'}}/>
            {i<log.length-1&&<div className="log-line"/>}
          </div>
          <div style={{flex:1,minWidth:0,paddingBottom:6}}>
            <div className="row"style={{marginBottom:6,gap:9}}>
              {author&&<Av user={author}size={24}/>}
              <span style={{fontSize:13,fontWeight:600,letterSpacing:'-.02em'}}>{author?.name||'Unknown'}</span>
              <span className="spacer"/>
              <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--ink-4)',flexShrink:0}}>
                {fmt.datetime(entry.createdAt)}
              </span>
            </div>
            <p style={{fontSize:13,color:'var(--ink-2)',lineHeight:1.7,fontWeight:300,wordBreak:'break-word'}}>
              {entry.text}
            </p>
          </div>
        </div>
      );
    })}</div>
  </div>;
}


/* ── TAB: FILES ── */
function ProjFilesTab({p,me,up}){
  const files=p.files||[];
  const inputRef=useRef();
  const handleUpload=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>4*1024*1024){alert('File too large — max 4MB');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const f={id:uid(),name:file.name,size:file.size,type:file.type,data:ev.target.result,uploadedBy:me.id,uploadedAt:new Date().toISOString()};
      up({files:[...files,f]});
    };
    reader.readAsDataURL(file);
  };
  const download=f=>{const a=document.createElement('a');a.href=f.data;a.download=f.name;a.click();};
  const fmtSize=b=>b<1024?`${b}B`:b<1024*1024?`${Math.round(b/1024)}KB`:`${(b/1024/1024).toFixed(1)}MB`;
  const icon=f=>{
    if(f.name.match(/\.pdf$/i))return'ti-file-type-pdf';
    if(f.name.match(/\.(xlsx?|csv)$/i))return'ti-file-spreadsheet';
    if(f.name.match(/\.(docx?)$/i))return'ti-file-word';
    if(f.name.match(/\.(jpe?g|png|gif|webp)$/i))return'ti-photo';
    return'ti-file';
  };
  return<div>
    <div className="drop-zone"style={{marginBottom:18}}onClick={()=>inputRef.current.click()}>
      <i className="ti ti-cloud-upload"style={{fontSize:28,color:'var(--ink-4)',display:'block',marginBottom:10}}/>
      <p style={{fontSize:14,fontWeight:500,marginBottom:2}}>Click to upload</p>
      <p style={{fontSize:12,color:'var(--ink-4)'}}>xlsx, pdf, doc, images — max 4MB each</p>
      <input type="file"ref={inputRef}onChange={handleUpload}accept=".xlsx,.xls,.pdf,.doc,.docx,.jpg,.jpeg,.png,.gif"/>
    </div>
    {!files.length&&<div className="empty-state"style={{padding:'20px 0'}}><i className="ti ti-files"/><p>No files uploaded yet</p></div>}
    <div className="stack">{files.map(f=><div key={f.id}className="file-row"onClick={()=>download(f)}>
      <i className={`ti ${icon(f)}`}style={{fontSize:22,color:'var(--ink-4)',flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:500,letterSpacing:'-.01em'}}className="trunc">{f.name}</div>
        <div style={{fontSize:11,color:'var(--ink-4)'}}>{fmtSize(f.size)} · {fmt.date(f.uploadedAt)}</div>
      </div>
      <button className="btn btn-ghost btn-xs"><i className="ti ti-download"/></button>
      <button className="btn btn-ghost btn-xs btn-danger"onClick={e=>{e.stopPropagation();up({files:files.filter(x=>x.id!==f.id)})}}><i className="ti ti-trash"/></button>
    </div>)}</div>
  </div>;
}

/* ═══════ GLOBAL TIMELINE ════════════════════════════════ */
function GlobalTimeline({store,setProjectId,setView}){
  const{projects}=store;
  const[mode,setMode]=useState('projects');
  const[colW,setColW]=useState(40);
  const gtRef=useRef(null);
  const active=projects.filter(p=>p.status!=='completed'&&p.startDate&&p.endDate);
  const noDate=projects.filter(p=>p.status!=='completed'&&(!p.startDate||!p.endDate));
  const allLav=active.flatMap(p=>(p.lavorazioni||[]).filter(l=>l.startDate&&l.endDate).map(l=>({...l,project:p})));

  /* date range */
  const allDates=mode==='tasks'?allLav.flatMap(l=>[new Date(l.startDate),new Date(l.endDate)]):active.flatMap(p=>[new Date(p.startDate),new Date(p.endDate)]);
  const today=new Date();today.setHours(0,0,0,0);
  let rStart,rEnd;
  if(allDates.length){
    rStart=new Date(Math.min(...allDates));rStart.setHours(0,0,0,0);
    rEnd=new Date(Math.max(...allDates));rEnd.setDate(rEnd.getDate()+7);rEnd.setHours(0,0,0,0);
  }else{rStart=new Date(today);rEnd=new Date(today.getTime()+30*86400000);}
  const TOTAL_DAYS=Math.max(14,Math.ceil((rEnd-rStart)/86400000));
  const LABEL_W=240;
  const ROW_H=68;
  const BAR_TOP=12;
  const BAR_H=44;

  useEffect(()=>{
    if(!gtRef.current)return;
    const measure=()=>{
      const avail=gtRef.current.offsetWidth||800;
      const computed=Math.max(22,Math.floor((avail-LABEL_W)/TOTAL_DAYS));
      setColW(Math.min(computed,52));
    };
    measure();window.addEventListener('resize',measure);
    return()=>window.removeEventListener('resize',measure);
  },[TOTAL_DAYS]);

  if(!active.length&&!noDate.length)return<div className="empty-state"><i className="ti ti-calendar"/><p>No active projects</p></div>;

  /* days + bands */
  const days=[];for(let i=0;i<TOTAL_DAYS;i++)days.push(new Date(rStart.getTime()+i*86400000));
  const bands=[];const dayBandIdx=[];
  days.forEach((d,i)=>{
    const mk=d.getFullYear()+'-'+d.getMonth();
    if(!bands.length||bands[bands.length-1].key!==mk)
      bands.push({key:mk,label:d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}),start:i,count:0});
    bands[bands.length-1].count++;dayBandIdx[i]=bands.length-1;
  });
  const MONTH_TINT='rgba(0,102,238,.04)';
  const dateToCol=d=>Math.round((new Date(d)-rStart)/86400000);
  const isWE=d=>{const w=d.getDay();return w===0||w===6;};
  const todayCol=dateToCol(today);
  const statusColor=s=>s==='planning'?'#3B5BDB':s==='active'?'#16A34A':s==='on_hold'?'#71717A':'#A1A1AA';

  const gridCols=`${LABEL_W}px repeat(${TOTAL_DAYS},${colW}px)`;
  const canvasW=LABEL_W+TOTAL_DAYS*colW;
  const rows=mode==='projects'?active:allLav;

  return<div className="fade">
    <div className="row page-hd">
      <div><div className="page-title">Timeline</div><div className="page-sub">All active projects at a glance</div></div>
      <span className="spacer"/>
      <div className="row"style={{gap:2,background:'var(--surface-2)',border:'1px solid var(--rule)',borderRadius:'var(--r-sm)',padding:3}}>
        <button className={`btn btn-sm ${mode==='projects'?'btn-primary':''}`}style={{border:'none',borderRadius:'var(--r-xs)'}}onClick={()=>setMode('projects')}><i className="ti ti-layout-kanban"/>Projects</button>
        <button className={`btn btn-sm ${mode==='tasks'?'btn-primary':''}`}style={{border:'none',borderRadius:'var(--r-xs)'}}onClick={()=>setMode('tasks')}>
          <i className="ti ti-list-check"/>Tasks {allLav.length>0&&<span style={{fontSize:9,opacity:.7}}>({allLav.length})</span>}
        </button>
      </div>
    </div>

    {rows.length===0?<div className="empty-state"><i className="ti ti-calendar"/><p>No {mode} with dates</p></div>:
    <div ref={gtRef} style={{border:'1px solid var(--rule)',borderRadius:'var(--r-lg)',overflow:'hidden',background:'var(--white)'}}>
      <div style={{overflowX:'auto'}}>
        <div style={{display:'grid',gridTemplateColumns:gridCols,width:canvasW,position:'relative'}}>
          {/* CORNER */}
          <div style={{gridColumn:1,gridRow:'1/3',background:'var(--paper)',borderRight:'2px solid var(--parchment-2)',borderBottom:'2px solid var(--parchment-2)',display:'flex',alignItems:'flex-end',padding:'8px 14px',fontSize:10,fontWeight:700,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'.06em'}}>{mode==='tasks'?'Task':'Project'}</div>
          {/* MONTH BANDS */}
          {bands.map((b,i)=>{const alt=i%2===1;return<div key={i}style={{gridColumn:`${b.start+2}/${b.start+b.count+2}`,gridRow:1,background:alt?MONTH_TINT:'var(--paper)',borderRight:'1px solid var(--parchment-2)',borderBottom:'1px solid var(--parchment-2)',padding:'10px 14px',fontSize:13,fontWeight:700,color:alt?'var(--gold-text)':'var(--ink-2)',whiteSpace:'nowrap',overflow:'hidden',letterSpacing:'-.01em'}}>{b.label}</div>;})}
          {/* DAY HEADERS */}
          {days.map((d,i)=>{const isT=d.getTime()===today.getTime();const we=isWE(d);const alt=dayBandIdx[i]%2===1;const bg=isT?'rgba(0,102,238,.1)':we?(alt?'rgba(0,102,238,.06)':'rgba(0,0,0,.03)'):alt?MONTH_TINT:'var(--paper)';return<div key={i}style={{gridColumn:i+2,gridRow:2,background:bg,borderRight:'1px solid rgba(0,0,0,.04)',borderBottom:'2px solid var(--parchment-2)',padding:'6px 0',fontSize:12,fontWeight:isT?800:600,color:isT?'var(--gold)':we?'var(--ink-5)':'var(--ink-4)',textAlign:'center',fontFamily:'var(--mono)',position:'relative'}}>{d.getDate()}{isT&&<div style={{position:'absolute',bottom:-2,left:'50%',transform:'translateX(-50%)',width:5,height:5,borderRadius:'50%',background:'var(--gold)'}}/>}</div>;})}

          {/* ROWS */}
          {rows.map((r,idx)=>{
            const isProj=mode==='projects';
            const color=isProj?statusColor(r.status):(CATEGORY_COLORS[r.category]||'#6B7280');
            const sd=isProj?r.startDate:r.startDate;
            const ed=isProj?r.endDate:r.endDate;
            const projId=isProj?r.id:r.project.id;
            const title=isProj?r.title:r.name;
            const sub=isProj?`${r.status} · ${(r.lavorazioni||[]).filter(l=>l.startDate&&l.endDate).length} tasks`:r.project.title;
            const barCol=Math.max(0,dateToCol(sd));
            const barDur=Math.max(1,Math.round((new Date(ed)-new Date(sd))/86400000));
            const barLeft=barCol*colW;
            const barWpx=Math.max(barDur*colW,colW*0.8);
            const gridRow=3+idx;
            return[
              <div key={`gtlc${idx}`} style={{gridColumn:1,gridRow,display:'flex',alignItems:'center',gap:8,padding:'0 10px 0 14px',borderRight:'2px solid var(--parchment-2)',borderBottom:'1px solid var(--rule)',background:'var(--white)',minHeight:ROW_H,cursor:'pointer'}}
                onClick={()=>{setProjectId(projId);setView('project-detail');}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--surface-2)'}
                onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                <div style={{width:4,height:38,borderRadius:2,background:color,flexShrink:0}}/>
                <div style={{overflow:'hidden',flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.01em'}}>{title}</div>
                  <div style={{fontSize:11,color:'var(--ink-4)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sub}</div>
                  {!isProj&&r.notes&&<div style={{fontSize:10.5,color:'var(--ink-3)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}} title={r.notes}><i className="ti ti-note"style={{fontSize:11,color,flexShrink:0}}/>{r.notes}</div>}
                </div>
              </div>,
              ...days.map((d,i)=>{
                const we=isWE(d);const isT=d.getTime()===today.getTime();
                const alt=dayBandIdx[i]%2===1;
                const bg=isT?'rgba(0,102,238,.04)':we?(alt?'rgba(0,102,238,.035)':'rgba(0,0,0,.02)'):alt?'rgba(0,102,238,.022)':'var(--white)';
                return<div key={`gttc${idx}-${i}`} style={{gridColumn:i+2,gridRow,borderRight:'1px solid rgba(0,0,0,.04)',borderBottom:'1px solid var(--rule)',background:bg,minHeight:ROW_H,position:'relative'}}/>;
              }),
              <div key={`gtbo${idx}`} style={{gridColumn:`2/${TOTAL_DAYS+2}`,gridRow,position:'relative',pointerEvents:'none',zIndex:5}}>
                {todayCol>=0&&todayCol<TOTAL_DAYS&&<div style={{position:'absolute',left:todayCol*colW+colW/2,top:0,bottom:0,width:1.5,background:'var(--gold)',opacity:.6,zIndex:6,pointerEvents:'none'}}/>}
                <div style={{position:'absolute',left:barLeft+'px',top:BAR_TOP,width:barWpx+'px',height:BAR_H,borderRadius:8,background:color,display:'flex',alignItems:'center',paddingLeft:12,paddingRight:10,cursor:'pointer',boxShadow:`0 2px 6px ${color}30,0 1px 2px rgba(0,0,0,.1)`,zIndex:5,overflow:'hidden',whiteSpace:'nowrap',pointerEvents:'auto'}}
                  onClick={()=>{setProjectId(projId);setView('project-detail');}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,overflow:'hidden',flex:1,pointerEvents:'none',minWidth:0}}>
                    {barWpx>50&&<span style={{fontSize:12,fontWeight:700,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',flex:1,letterSpacing:'-.01em'}}>{title}</span>}
                    {!isProj&&r.notes&&barWpx>60&&<i className="ti ti-note"style={{fontSize:13,color:'rgba(255,255,255,.85)',flexShrink:0}}title={r.notes}/>}
                  </div>
                </div>
              </div>
            ];
          })}
        </div>
      </div>
      {noDate.length>0&&<div style={{padding:'12px 14px',borderTop:'1px solid var(--rule)',background:'var(--paper)',color:'var(--ink-4)',fontSize:12}}>
        <strong style={{color:'var(--ink-3)'}}>{noDate.length} project{noDate.length>1?'s':''} without dates:</strong> {noDate.map(p=>p.title).join(' · ')}
      </div>}
      <div style={{padding:'10px 14px',background:'var(--paper)',display:'flex',gap:14,flexWrap:'wrap',alignItems:'center',borderTop:'1px solid var(--rule)'}}>
        <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--ink-4)'}}><div style={{width:12,height:2,background:'var(--gold)',borderRadius:1}}/>Today</div>
        {mode==='tasks'&&Object.entries(CATEGORY_COLORS).map(([cat,color])=>allLav.some(l=>l.category===cat)&&<div key={cat}style={{display:'flex',alignItems:'center',gap:5,background:color+'14',border:`1px solid ${color}28`,borderRadius:'var(--r-xs)',padding:'2px 7px'}}>
          <div style={{width:7,height:7,borderRadius:2,background:color}}/><span style={{fontSize:10,color,fontWeight:600}}>{cat}</span>
        </div>)}
        <span style={{fontSize:11,color:'var(--ink-4)',marginLeft:'auto'}}>Click any row to open project</span>
      </div>
    </div>}
  </div>;
}

/* ═══════ STAFFING ═══════════════════════════════════════ */
function StaffingView({store,me}){
  const{users,projects,duties}=store;
  const now=new Date();
  const[sel,setSel]=useState(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  const isAdmin=me.role==='admin';
  const targetUsers=isAdmin?users:[users.find(u=>u.id===me.id)||me];
  const months=useMemo(()=>{const r=[];for(let i=-3;i<=9;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);r.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}return r;},[]);
  const staffFor=userId=>{
    const[y,m]=sel.split('-').map(Number);
    const mS=new Date(y,m-1,1),mE=new Date(y,m,0);
    let total=0;const breakdown=[];
    projects.forEach(p=>{
      if(new Date(p.endDate||0)<mS||new Date(p.startDate||'9999')-mE>0)return;
      (p.assignments||[]).filter(a=>a.userId===userId).forEach(a=>{
        if(!a.startDate||!a.endDate)return;
        if(new Date(a.endDate)<mS||new Date(a.startDate)>mE)return;
        const duty=duties.find(d=>d.id===a.dutyId);
        total+=a.allocationPct;
        breakdown.push({project:p,duty,alloc:a.allocationPct});
      });
    });
    return{total,breakdown};
  };
  return<div className="fade">
    <div className="row page-hd">
      <div><div className="page-title">Staffing</div><div className="page-sub">Team allocation overview</div></div>
      <span className="spacer"/>
      <select value={sel}onChange={e=>setSel(e.target.value)}style={{width:'auto'}}>
        {months.map(m=>{const[y,mo]=m.split('-').map(Number);return<option key={m}value={m}>{new Date(y,mo-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>;})}
      </select>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14,marginBottom:24}}>
      {targetUsers.map(u=>{
        const{total,breakdown}=staffFor(u.id);
        const over=total>100;
        const barColor=over?'var(--danger)':total>80?'var(--gold)':'var(--s-active)';
        const numColor=over?'var(--danger)':total>80?'var(--gold-text)':'var(--s-active)';
        return<div key={u.id}className="staff-card">
          <div className="row"style={{marginBottom:14}}>
            <Av user={u}size={36}/>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,letterSpacing:'-.01em'}}>{u.name}</div>
              <div style={{fontSize:11,color:'var(--ink-4)',textTransform:'capitalize',marginTop:1}}>{u.role}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:28,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'-.05em',color:numColor,lineHeight:1}}>{total}%</div>
              <div style={{fontSize:10,color:'var(--ink-4)',marginTop:2}}>allocated</div>
            </div>
          </div>
          <div style={{background:'var(--rule)',borderRadius:'var(--r-pill)',height:6,overflow:'hidden'}}>
            <div style={{width:`${Math.min(total,100)}%`,height:'100%',borderRadius:'var(--r-pill)',background:barColor,transition:'width .3s'}}/>
          </div>
          {over&&<div style={{fontSize:11,color:'var(--danger)',marginTop:5,display:'flex',alignItems:'center',gap:4}}><i className="ti ti-alert-triangle"style={{fontSize:12}}/>Over-allocated by {total-100}%</div>}
          {breakdown.length>0&&<div style={{marginTop:13,paddingTop:11,borderTop:'1px solid var(--rule)'}}>
            {breakdown.map(({project:p,duty,alloc},i)=><div key={i}style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <div style={{width:3,height:16,borderRadius:2,background:p.status==='planning'?'var(--s-planning)':p.status==='active'?'var(--s-active)':'var(--s-hold)',flexShrink:0}}/>
              <span style={{fontSize:12,color:'var(--ink-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.01em'}}>{p.title}</span>
              {duty&&<span style={{fontSize:10,padding:'1px 5px',borderRadius:3,background:duty.color+'15',color:duty.color,fontWeight:500}}>{duty.name}</span>}
              <span style={{fontSize:12,fontWeight:600,fontFamily:'var(--mono)'}}>{alloc}%</span>
            </div>)}
          </div>}
          {!breakdown.length&&<p style={{fontSize:12,color:'var(--ink-4)',textAlign:'center',marginTop:12}}>Free this month</p>}
        </div>;
      })}
    </div>
    {isAdmin&&<div className="card">
      <div style={{fontWeight:600,fontSize:15,letterSpacing:'-.03em',marginBottom:16}}>Team snapshot</div>
      <div className="g4"style={{gap:10}}>
        {[
          {label:'Avg allocation',value:`${Math.round(users.reduce((a,u)=>a+staffFor(u.id).total,0)/users.length)}%`},
          {label:'Over-allocated', value:users.filter(u=>staffFor(u.id).total>100).length},
          {label:'Under 50%',      value:users.filter(u=>staffFor(u.id).total<50).length},
          {label:'Active projects',value:projects.filter(p=>p.status==='active').length},
        ].map(s=><div key={s.label}className="stat-box">
          <div className="stat-label">{s.label}</div>
          <div className="stat-num">{s.value}</div>
        </div>)}
      </div>
    </div>}
  </div>;
}

/* ═══════ ARCHIVE ════════════════════════════════════════ */

    {archived.length>0&&<div style={{background:'var(--white)',border:'1px solid var(--rule)',borderRadius:'var(--r-lg)',overflow:'hidden',boxShadow:'var(--shadow-xs)'}}>
      <table className="tbl">

        <tbody>{archived.map(p=>{
          const days=p.startDate&&p.endDate?Math.round((new Date(p.endDate)-new Date(p.startDate))/86400000):null;
          return<tr key={p.id}onClick={()=>{setProjectId(p.id);setView('project-detail');}}>

              <div style={{width:3,height:22,borderRadius:2,background:'var(--s-done)',flexShrink:0}}/>
              <div>
                <div style={{fontWeight:600,letterSpacing:'-.01em'}}>{p.title}</div>
                {p.description&&<div style={{fontSize:11,color:'var(--ink-4)',marginTop:1,maxWidth:320,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.description.slice(0,60)}{p.description.length>60?'…':''}</div>}
              </div>
            </div></td>
            <td style={{color:'var(--ink-3)',fontSize:12,fontFamily:'var(--mono)',letterSpacing:'-.01em'}}>{fmt.date(p.archivedAt||p.updatedAt)}</td>
            <td style={{fontSize:12,color:'var(--ink-4)',fontFamily:'var(--mono)'}}>{days?`${days} days`:'—'}</td>
            <td className="mono"style={{fontSize:13,fontWeight:500,color:p.budget?'var(--ink)':'var(--ink-4)'}}>{fmt.currency(p.budget)}</td>
            <td onClick={e=>e.stopPropagation()}>
              <button className="btn btn-xs"onClick={()=>upsertProject({...p,status:'on_hold',archivedAt:null})}style={{gap:4}}>
                <i className="ti ti-refresh"style={{fontSize:11}}/>Restore
              </button>
            </td>
          </tr>;
        })}</tbody>
      </table>
    </div>}
  </div>;
}

/* ═══════ APP ROOT ═══════════════════════════════════════ */
function App(){
  const store=useStore();
  const[me,setMe]=useState(()=>LS.get('so2_me',null));
  const[view,setView]=useState('projects');
  const[projectId,setProjectId]=useState(null);
  const[estimationId,setEstimationId]=useState(null);
  useEffect(()=>{if(me)LS.set('so2_me',me);else localStorage.removeItem('so2_me');},[me]);
  if(!me)return<Login users={store.users}onLogin={setMe}/>;
  const isAdmin=me.role==='admin';
  const navTo=(v,pid,eid)=>{ setView(v); if(pid!==undefined)setProjectId(pid); if(eid!==undefined)setEstimationId(eid); };
  const isFullPage=view==='project-detail'||view==='estimation-detail';
  const titles={projects:'Projects',estimations:'Estimations',timeline:'Timeline',staffing:'Staffing',archive:'Archive',team:'Team & Duties'};
  return<div className="shell">
    <Sidebar me={me}view={view}setView={navTo}onLogout={()=>setMe(null)}isAdmin={isAdmin}/>
    <div className="main">
      {!isFullPage&&<div className="topbar">
        <span style={{fontSize:16,fontFamily:'var(--sans)',fontWeight:700,letterSpacing:'-.03em',color:'var(--ink)'}}>{titles[view]||''}</span>
        <div style={{flex:1}}/>
      </div>}
      {view==='project-detail'?(
        <ProjectDetail id={projectId}store={store}me={me}setView={v=>setView(v)}setEstimationId={setEstimationId}setNavView={v=>setView(v)}/>
      ):(
        <div className="page">
          {view==='projects'    &&<ProjectsOverview store={store}me={me}setView={setView}setProjectId={setProjectId}/>}
          {view==='estimations' &&<EstimationList   store={store}setView={setView}setDetailId={setEstimationId}/>}
          {view==='estimation-detail'&&<EstimationDetail id={estimationId}store={store}me={me}setView={setView}onConverted={pid=>{setProjectId(pid);setView('project-detail');}}/>}
          {view==='timeline'    &&<GlobalTimeline   store={store}setProjectId={setProjectId}setView={setView}/>}
          {view==='staffing'    &&<StaffingView     store={store}me={me}/>}
          {view==='archive'     &&<ArchiveView      store={store}setProjectId={setProjectId}setView={setView}/>}
          {view==='team'        &&isAdmin&&<TeamPage store={store}/>}
        </div>
      )}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
